name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install

      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Updating version to $VERSION"
          # Update tauri.conf.json
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json
          # Update Cargo.toml
          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          # Update package.json
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Reportly ${{ github.ref_name }}"
          releaseBody: ""
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: false

      - name: Inject Sequoia icon variants
        continue-on-error: true
        run: bash src-tauri/scripts/inject-icon-variants.sh

      - name: Sign updater artifact and upload manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUNDLE_DIR="src-tauri/target/release/bundle/macos"
          TAR_FILE="${BUNDLE_DIR}/Reportly.app.tar.gz"

          # The tauri-action re-packages the .app, invalidating the original .sig
          # Re-sign the tar.gz that was actually uploaded
          if [ ! -f "$TAR_FILE" ]; then
            echo "tar.gz not found at $TAR_FILE, searching..."
            TAR_FILE=$(find . -path "*/release/bundle/macos/*.app.tar.gz" ! -name "*.sig" 2>/dev/null | head -1)
          fi

          if [ -z "$TAR_FILE" ] || [ ! -f "$TAR_FILE" ]; then
            echo "No .app.tar.gz found, skipping updater manifest"
            exit 0
          fi

          echo "Signing $TAR_FILE..."
          pnpm tauri signer sign "$TAR_FILE" --private-key "$TAURI_SIGNING_PRIVATE_KEY"
          SIGNATURE=$(cat "${TAR_FILE}.sig")

          TAR_ASSET_NAME="Reportly_aarch64.app.tar.gz"
          DOWNLOAD_URL="https://github.com/nicholastn1/reportly/releases/download/${GITHUB_REF_NAME}/${TAR_ASSET_NAME}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "Reportly ${GITHUB_REF_NAME}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIGNATURE}",
                "url": "${DOWNLOAD_URL}"
              },
              "darwin-x86_64": {
                "signature": "${SIGNATURE}",
                "url": "${DOWNLOAD_URL}"
              }
            }
          }
          EOF

          echo "Uploading latest.json..."
          gh release upload "${GITHUB_REF_NAME}" latest.json --repo nicholastn1/reportly --clobber
